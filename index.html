<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easter Calendar</title>
<style>
body{font-family:Arial;background:#f4f1eb;margin:0;text-align:center;}
.scene{position:relative;max-width:700px;margin:20px auto;}
.basket{width:100%;}
.egg{position:absolute;width:12%;cursor:pointer;}
.egg.opened{display:none;}
.gallery{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px;}
.gallery img{width:150px;border:3px solid orange;border-radius:10px;}
</style>
</head>
<body>

<h1>Easter Calendar</h1>
<p>Click an egg to reveal today's artwork.</p>

<div class="scene">
<img src="bilder/easterkurv.png" class="basket">
<img src="bilder/egg1.png" class="egg" style="left:20%;top:40%;" onclick="openEgg(1,this)">
<img src="bilder/egg2.png" class="egg" style="left:35%;top:35%;" onclick="openEgg(2,this)">
<img src="bilder/egg3.png" class="egg" style="left:50%;top:40%;" onclick="openEgg(3,this)">
<img src="bilder/egg4.png" class="egg" style="left:65%;top:38%;" onclick="openEgg(4,this)">
<img src="bilder/egg5.png" class="egg" style="left:78%;top:50%;" onclick="openEgg(5,this)">
</div>

<div class="gallery" id="gallery"></div>

<script>
function openEgg(day, el){
  el.classList.add("opened");
  const img=document.createElement("img");
  img.src="bilder/artwork-"+day+".jpg";
  document.getElementById("gallery").appendChild(img);
}
</script>

</body>
</html>
