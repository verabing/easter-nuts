<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easter Calendar</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #222;
      text-align: center;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px 16px 44px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 3rem;
    }

    .lead {
      margin: 0 0 16px;
      font-size: 1.06rem;
      color: #444;
    }

    .simulator {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 18px;
      padding: 10px 14px;
      border: 1px solid #d9d9d9;
      border-radius: 999px;
      background: #fafafa;
      flex-wrap: wrap;
      justify-content: center;
    }

    .simulator label {
      font-size: 0.95rem;
      color: #444;
    }

    .simulator select,
    .simulator button {
      font: inherit;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid #cfcfcf;
      background: white;
      cursor: pointer;
    }

    .scene {
      position: relative;
      max-width: 780px;
      margin: 8px auto 18px;
    }

    .basket {
      width: 100%;
      display: block;
    }

    .egg {
      position: absolute;
      cursor: default;
      transition: transform .18s ease, filter .18s ease, opacity .18s ease;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,.18));
      user-select: none;
      transform-origin: center bottom;
    }

    .egg img {
      width: 100%;
      height: auto;
      display: block;
    }

    .egg.opened {
      opacity: 0;
      pointer-events: none;
    }

    .egg.available {
      cursor: pointer;
      animation: wiggleHatch 1.15s ease-in-out infinite;
    }

    .egg.available:hover {
      filter: drop-shadow(0 14px 18px rgba(0,0,0,.22));
    }

    @keyframes wiggleHatch {
      0%   { transform: rotate(0deg) translateY(0) scale(1); }
      18%  { transform: rotate(-3deg) translateY(-3px) scale(1.04); }
      36%  { transform: rotate(3deg) translateY(0) scale(1.07); }
      54%  { transform: rotate(-2deg) translateY(-4px) scale(1.05); }
      72%  { transform: rotate(2deg) translateY(0) scale(1.03); }
      100% { transform: rotate(0deg) translateY(0) scale(1); }
    }

    .status {
      margin-top: 6px;
      color: #555;
      font-size: .98rem;
    }

    .gallery {
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .thumb {
      width: 180px;
      border: none;
      border-radius: 10px;
      display: block;
      box-shadow: 0 10px 22px rgba(0,0,0,.16);
      background: white;
      cursor: pointer;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.78);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 50;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      position: relative;
      max-width: min(92vw, 980px);
      max-height: 90vh;
    }

    .modal-content img {
      max-width: 100%;
      max-height: 90vh;
      display: block;
      border-radius: 10px;
      box-shadow: 0 20px 48px rgba(0,0,0,.35);
      background: white;
    }

    .close {
      position: absolute;
      top: -10px;
      right: -10px;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 999px;
      background: white;
      box-shadow: 0 6px 16px rgba(0,0,0,.22);
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }

    @media (max-width: 760px) {
      h1 { font-size: 2.3rem; }
      .scene { max-width: 100%; }
      .gallery {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        max-width: 360px;
        margin: 20px auto 0;
      }
      .thumb { width: 100%; }
      .simulator { border-radius: 16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Easter Calendar</h1>
    <p class="lead">
      From left to right, one egg opens each day from 2 April through 6 April.
      Click the available egg to open the artwork in a large view.
    </p>

    <div class="simulator">
      <label for="dateSimulator">Test date:</label>
      <select id="dateSimulator">
        <option value="">Use real date</option>
        <option value="2026-04-02">02.04.2026</option>
        <option value="2026-04-03">03.04.2026</option>
        <option value="2026-04-04">04.04.2026</option>
        <option value="2026-04-05">05.04.2026</option>
        <option value="2026-04-06">06.04.2026</option>
      </select>
      <button type="button" id="resetOpened">Reset opened eggs</button>
    </div>

    <div class="scene">
      <img src="Bilder/easterkurv.png" class="basket" alt="Easter basket" />

      <div class="egg" id="egg1" data-day="1" style="left: 12%; top: 34%; width: 20%;">
        <img src="Bilder/egg1.png" alt="Egg 1" />
      </div>
      <div class="egg" id="egg2" data-day="2" style="left: 26%; top: 25%; width: 22%;">
        <img src="Bilder/egg2.png" alt="Egg 2" />
      </div>
      <div class="egg" id="egg3" data-day="3" style="left: 42%; top: 31%; width: 19%;">
        <img src="Bilder/egg3.png" alt="Egg 3" />
      </div>
      <div class="egg" id="egg4" data-day="4" style="left: 53%; top: 24%; width: 19%;">
        <img src="Bilder/egg4.png" alt="Egg 4" />
      </div>
      <div class="egg" id="egg5" data-day="5" style="left: 64%; top: 33%; width: 17%;">
        <img src="Bilder/egg5.png" alt="Egg 5" />
      </div>
    </div>

    <div class="status" id="status">Only eggs up to today's date can be opened.</div>
    <div class="gallery" id="gallery"></div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="close" id="closeBtn" aria-label="Close">&times;</button>
      <img id="modalImg" src="" alt="" />
    </div>
  </div>

  <script>
    const STORAGE_PREFIX = "easter_2026_";
    const gallery = document.getElementById("gallery");
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");
    const closeBtn = document.getElementById("closeBtn");
    const statusEl = document.getElementById("status");
    const dateSimulator = document.getElementById("dateSimulator");
    const resetOpenedBtn = document.getElementById("resetOpened");

    const days = {
      1: { unlock: "2026-04-02", file: "Bilder/artwork-1.jpg" },
      2: { unlock: "2026-04-03", file: "Bilder/artwork-2.jpg" },
      3: { unlock: "2026-04-04", file: "Bilder/artwork-3.jpg" },
      4: { unlock: "2026-04-05", file: "Bilder/artwork-4.jpg" },
      5: { unlock: "2026-04-06", file: "Bilder/artwork-5.jpg" }
    };

    function isOpened(day) {
      return localStorage.getItem(STORAGE_PREFIX + day) === "1";
    }

    function markOpened(day) {
      localStorage.setItem(STORAGE_PREFIX + day, "1");
    }

    function clearOpened() {
      for (let day = 1; day <= 5; day++) {
        localStorage.removeItem(STORAGE_PREFIX + day);
      }
    }

    function getCurrentDate() {
      if (dateSimulator.value) {
        return new Date(dateSimulator.value + "T12:00:00");
      }
      return new Date();
    }

    function canOpen(day) {
      const today = getCurrentDate();
      const unlock = new Date(days[day].unlock + "T00:00:00");
      return today >= unlock;
    }

    function showModal(src, altText) {
      modalImg.src = src;
      modalImg.alt = altText || "Artwork";
      modal.classList.add("show");
    }

    function closeModal() {
      modal.classList.remove("show");
    }

    function addThumb(day) {
      if (document.getElementById("thumb-" + day)) return;

      const img = document.createElement("img");
      img.src = days[day].file;
      img.alt = "Artwork " + day;
      img.className = "thumb";
      img.id = "thumb-" + day;
      img.addEventListener("click", function () {
        showModal(days[day].file, "Artwork " + day);
      });
      gallery.appendChild(img);
    }

    function rebuildGallery() {
      gallery.innerHTML = "";
      for (let day = 1; day <= 5; day++) {
        if (isOpened(day)) {
          addThumb(day);
        }
      }
    }

    function sync() {
      let openedCount = 0;
      const simulated = dateSimulator.value;

      for (let day = 1; day <= 5; day++) {
        const egg = document.getElementById("egg" + day);
        const opened = isOpened(day);
        const available = canOpen(day) && !opened;

        egg.classList.toggle("opened", opened);
        egg.classList.toggle("available", available);

        egg.onclick = null;
        if (available) {
          egg.onclick = function () {
            showModal(days[day].file, "Artwork " + day);
            markOpened(day);
          };
        }

        if (opened) {
          openedCount += 1;
        }
      }

      rebuildGallery();

      if (simulated) {
        statusEl.textContent = openedCount + " of 5 artworks are already opened. Preview date: " + simulated.split("-").reverse().join(".");
      } else {
        statusEl.textContent = openedCount + " of 5 artworks are already opened.";
      }
    }

    dateSimulator.addEventListener("change", function () {
      sync();
    });

    resetOpenedBtn.addEventListener("click", function () {
      clearOpened();
      sync();
    });

    closeBtn.addEventListener("click", function () {
      closeModal();
      sync();
    });

    modal.addEventListener("click", function (e) {
      if (e.target === modal) {
        closeModal();
        sync();
      }
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        closeModal();
        sync();
      }
    });

    window.addEventListener("load", sync);
  </script>
</body>
</html>
