<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Easter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Nunito', Arial, sans-serif;
      background: #ffffff;
      color: #222;
      text-align: center;
    }
  
    

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(-40px); }
}
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px 16px 44px;
    }

    h1 {
      margin: 0 0 10px;
      font-family: 'Baloo 2', Arial, sans-serif;
      font-size: clamp(3rem, 7vw, 4.6rem);
      line-height: 0.95;
      letter-spacing: 0.01em;
      font-weight: 800;
    }

    .title-letter {
      display: inline-block;
      transform-origin: center bottom;
    }

    h1.animate .title-letter {
      animation: titleWave 0.42s ease-in-out 2;
      animation-delay: calc(var(--i) * 0.09s);
    }

    @keyframes titleWave {
      0%, 100% { transform: translateY(0) scale(1); }
      35% { transform: translateY(-4px) scale(1.18); }
      60% { transform: translateY(-1px) scale(1.08); }
    }

    h1 .c1 { color: #f48fa3; }
    h1 .c2 { color: #f2c500; }
    h1 .c3 { color: #7fd1df; }
    h1 .c4 { color: #a7c91f; }
    h1 .c5 { color: #f39b34; }

    .lead {
      margin: 0 0 16px;
      font-size: 1.08rem;
      color: #444;
    }

    .simulator {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 18px;
      padding: 10px 14px;
      border: 1px solid #d9d9d9;
      border-radius: 999px;
      background: #fafafa;
      flex-wrap: wrap;
      justify-content: center;
    }

    .simulator label {
      font-size: 0.95rem;
      color: #444;
    }

    .simulator select,
    .simulator button {
      font: inherit;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid #cfcfcf;
      background: white;
      cursor: pointer;
    }

    .scene {
      position: relative;
      max-width: 780px;
      margin: 8px auto 18px;
    }

    .basket {
      width: 100%;
      display: block;
    }

    .egg {
      position: absolute;
      cursor: default;
      transition: transform .18s ease, filter .18s ease, opacity .18s ease;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,.18));
      user-select: none;
      transform-origin: center bottom;
    }

    .egg img {
      width: 100%;
      height: auto;
      display: block;
    }

    .egg.opened {
      opacity: 0;
      pointer-events: none;
    }

    .egg.available {
      cursor: pointer;
      animation: wiggleHatch 1.15s ease-in-out infinite;
    }

    .egg.available:hover {
      filter: drop-shadow(0 14px 18px rgba(0,0,0,.22));
    }

    @keyframes wiggleHatch {
      0%   { transform: rotate(0deg) translateY(0) scale(1); }
      18%  { transform: rotate(-3deg) translateY(-3px) scale(1.04); }
      36%  { transform: rotate(3deg) translateY(0) scale(1.07); }
      54%  { transform: rotate(-2deg) translateY(-4px) scale(1.05); }
      72%  { transform: rotate(2deg) translateY(0) scale(1.03); }
      100% { transform: rotate(0deg) translateY(0) scale(1); }
    }

    .status {
      margin-top: 6px;
      color: #555;
      font-size: .98rem;
    }

    .gallery {
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .thumb {
      width: 180px;
      border: none;
      border-radius: 10px;
      display: block;
      box-shadow: 0 10px 22px rgba(0,0,0,.16);
      background: white;
      cursor: pointer;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.78);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 50;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      position: relative;
      width: min(92vw, 980px);
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-stage {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-content img {
      max-width: 100%;
      max-height: 90vh;
      display: block;
      border-radius: 10px;
      box-shadow: 0 20px 48px rgba(0,0,0,.35);
      background: white;
    }

    .close,
    .nav-btn {
      position: absolute;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 999px;
      background: white;
      box-shadow: 0 6px 16px rgba(0,0,0,.22);
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close {
      top: -10px;
      right: -10px;
    }

    .nav-btn {
      top: 50%;
      transform: translateY(-50%);
    }

    .nav-prev { left: -14px; }
    .nav-next { right: -14px; }

    .nav-btn.hidden {
      display: none;
    }

    @media (max-width: 760px) {
      .scene { max-width: 100%; }
      .gallery {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        max-width: 360px;
        margin: 20px auto 0;
      }
      .thumb { width: 100%; }
      .simulator { border-radius: 16px; }
      .nav-prev { left: -4px; }
      .nav-next { right: -4px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 id="pageTitle">
      <span class="title-letter c1" style="--i:0;">H</span><span class="title-letter c2" style="--i:1;">a</span><span class="title-letter c3" style="--i:2;">p</span><span class="title-letter c4" style="--i:3;">p</span><span class="title-letter c5" style="--i:4;">y</span>
      <span class="title-letter c2" style="--i:5;">E</span><span class="title-letter c3" style="--i:6;">a</span><span class="title-letter c4" style="--i:7;">s</span><span class="title-letter c1" style="--i:8;">t</span><span class="title-letter c5" style="--i:9;">e</span><span class="title-letter c2" style="--i:10;">r</span>
    </h1>

    <p class="lead">Every day you can open an Easter egg.</p>

    <div class="simulator">
      <label for="dateSimulator">Test date:</label>
      <select id="dateSimulator">
        <option value="">Use real date</option>
        <option value="2026-04-02">02.04.2026</option>
        <option value="2026-04-03">03.04.2026</option>
        <option value="2026-04-04">04.04.2026</option>
        <option value="2026-04-05">05.04.2026</option>
        <option value="2026-04-06">06.04.2026</option>
      </select>
      <button type="button" id="resetOpened">Reset opened eggs</button>
    </div>

    <div class="scene">
      <img src="Bilder/easterkurv.png" class="basket" alt="Easter basket" />

      <div class="egg" id="egg1" data-day="1" style="left: 10%; top: 33%; width: 21%;">
        <img src="Bilder/egg1.png" alt="Egg 1" />
      </div>
      <div class="egg" id="egg2" data-day="2" style="left: 22%; top: 24%; width: 22%;">
        <img src="Bilder/egg2.png" alt="Egg 2" />
      </div>
      <div class="egg" id="egg3" data-day="3" style="left: 35%; top: 29%; width: 20%;">
        <img src="Bilder/egg3.png" alt="Egg 3" />
      </div>
      <div class="egg" id="egg4" data-day="4" style="left: 47%; top: 24%; width: 20%;">
        <img src="Bilder/egg4.png" alt="Egg 4" />
      </div>
      <div class="egg" id="egg5" data-day="5" style="left: 58%; top: 31%; width: 18%;">
        <img src="Bilder/egg5.png" alt="Egg 5" />
      </div>
    </div>

    <div class="status" id="status">Only eggs up to today's date can be opened.</div>
    <div class="gallery" id="gallery"></div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="close" id="closeBtn" aria-label="Close">&times;</button>
      <button class="nav-btn nav-prev hidden" id="prevBtn" aria-label="Previous image">&#8249;</button>
      <div class="modal-stage">
        <img id="modalImg" src="" alt="" />
      </div>
      <button class="nav-btn nav-next hidden" id="nextBtn" aria-label="Next image">&#8250;</button>
    </div>
  </div>

  <script>
    const STORAGE_PREFIX = "easter_2026_";
    const gallery = document.getElementById("gallery");
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");
    const closeBtn = document.getElementById("closeBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const statusEl = document.getElementById("status");
    const dateSimulator = document.getElementById("dateSimulator");
    const resetOpenedBtn = document.getElementById("resetOpened");
    const pageTitle = document.getElementById("pageTitle");

    const days = {
      1: { unlock: "2026-04-02", images: ["Bilder/artwork-1.jpg", "Bilder/artwork-1a.jpg"] },
      2: { unlock: "2026-04-03", images: ["Bilder/artwork-2.jpg", "Bilder/artwork-2a.jpg"] },
      3: { unlock: "2026-04-04", images: ["Bilder/artwork-3.jpg", "Bilder/artwork-3a.jpg"] },
      4: { unlock: "2026-04-05", images: ["Bilder/artwork-4.jpg", "Bilder/artwork-4a.jpg"] },
      5: { unlock: "2026-04-06", images: ["Bilder/artwork-5.jpg", "Bilder/artwork-5a.jpg"] }
    };

    let currentImages = [];
    let currentImageIndex = 0;

    function runTitleWave() {
      pageTitle.classList.remove("animate");
      void pageTitle.offsetWidth;
      pageTitle.classList.add("animate");
      setTimeout(() => {
        pageTitle.classList.remove("animate");
      }, 2600);
    }

    function isOpened(day) {
      return localStorage.getItem(STORAGE_PREFIX + day) === "1";
    }

    function markOpened(day) {
      localStorage.setItem(STORAGE_PREFIX + day, "1");
    }

    function clearOpened() {
      for (let day = 1; day <= 5; day++) {
        localStorage.removeItem(STORAGE_PREFIX + day);
      }
    }

    function getCurrentDate() {
      if (dateSimulator.value) {
        return new Date(dateSimulator.value + "T12:00:00");
      }
      return new Date();
    }

    function canOpen(day) {
      const today = getCurrentDate();
      const unlock = new Date(days[day].unlock + "T00:00:00");
      return today >= unlock;
    }

    function updateModalNav() {
      prevBtn.classList.toggle("hidden", currentImages.length <= 1);
      nextBtn.classList.toggle("hidden", currentImages.length <= 1);
    }

    function renderModalImage() {
      modalImg.src = currentImages[currentImageIndex] || "";
      modalImg.alt = "Artwork image";
      updateModalNav();
    }

    function showModal(images, startIndex) {
      currentImages = images.slice();
      currentImageIndex = startIndex || 0;
      renderModalImage();
      modal.classList.add("show");
    }

    function closeModal() {
      modal.classList.remove("show");
    }

    function showPrev() {
      if (currentImages.length <= 1) return;
      currentImageIndex = (currentImageIndex - 1 + currentImages.length) % currentImages.length;
      renderModalImage();
    }

    function showNext() {
      if (currentImages.length <= 1) return;
      currentImageIndex = (currentImageIndex + 1) % currentImages.length;
      renderModalImage();
    }

    function addThumb(day) {
      if (document.getElementById("thumb-" + day)) return;

      const img = document.createElement("img");
      img.src = days[day].images[0];
      img.alt = "Artwork " + day;
      img.className = "thumb";
      img.id = "thumb-" + day;
      img.addEventListener("click", function () {
        showModal(days[day].images, 0);
      });
      gallery.appendChild(img);
    }

    function rebuildGallery() {
      gallery.innerHTML = "";
      for (let day = 1; day <= 5; day++) {
        if (isOpened(day)) addThumb(day);
      }
    }

    function sync() {
      let openedCount = 0;
      const simulated = dateSimulator.value;

      for (let day = 1; day <= 5; day++) {
        const egg = document.getElementById("egg" + day);
        const opened = isOpened(day);
        const available = canOpen(day) && !opened;

        egg.classList.toggle("opened", opened);
        egg.classList.toggle("available", available);

        egg.onclick = null;
        if (available) {
          egg.onclick = function () {
            showModal(days[day].images, 0);
            markOpened(day);
          };
        }

        if (opened) openedCount += 1;
      }

      rebuildGallery();

      if (simulated) {
        statusEl.textContent = openedCount + " of 5 artworks are already opened. Preview date: " + simulated.split("-").reverse().join(".");
      } else {
        statusEl.textContent = openedCount + " of 5 artworks are already opened.";
      }
    }

    dateSimulator.addEventListener("change", function () { sync(); });
    resetOpenedBtn.addEventListener("click", function () { clearOpened(); sync(); });

    closeBtn.addEventListener("click", function () {
      closeModal();
      sync();
    });

    prevBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      showPrev();
    });

    nextBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      showNext();
    });

    modal.addEventListener("click", function (e) {
      if (e.target === modal) {
        closeModal();
        sync();
      }
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        closeModal();
        sync();
      } else if (e.key === "ArrowLeft" && modal.classList.contains("show")) {
        showPrev();
      } else if (e.key === "ArrowRight" && modal.classList.contains("show")) {
        showNext();
      }
    });

    window.addEventListener("load", function () {
      runTitleWave();
      sync();
    });
  </script>
</body>
</html>
